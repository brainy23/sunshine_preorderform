<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Tent Preorder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.5;
      background: #fafafa;
    }

    h1, h2, h3 {
      margin-bottom: 8px;
    }

    .section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .radio-group label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .dynamic-name-group {
      margin-top: 15px;
      padding: 12px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fcfcfc;
    }

    .small-note {
      font-size: 0.9rem;
      color: #555;
    }

    .total-box {
      font-size: 1.2rem;
      font-weight: bold;
      padding: 14px;
      background: #f3f3f3;
      border-radius: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 12px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .error-text {
      color: #b00020;
      font-size: 0.9rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Name Tent Preorder Form</h1>
  <p>Please fill in your order details below.</p>

  <form id="orderForm">
    <div class="section">
      <h2>Customer Details</h2>

      <label for="customerName">Your Name</label>
      <input type="text" id="customerName" required />

      <label for="contact">Telegram Handle (@ included)</label>
      <input type="text" id="contact" required />
    </div>

    <div class="section">
      <h2>Order Quantities</h2>
      <p class="small-note">Enter the quantity for each design.</p>

      <div class="row">
        <div>
          <label for="design1Qty">Design 1 Qty</label>
          <input type="number" id="design1Qty" min="0" value="0" />
        </div>
        <div>
          <label for="design2Qty">Design 2 Qty</label>
          <input type="number" id="design2Qty" min="0" value="0" />
        </div>
        <div>
          <label for="design3Qty">Design 3 Qty</label>
          <input type="number" id="design3Qty" min="0" value="0" />
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Name Printing</h2>

      <label>Are all name tents using the same name?</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="sameNameMode" value="yes" checked />
          Yes
        </label>
        <label>
          <input type="radio" name="sameNameMode" value="no" />
          No
        </label>
      </div>

      <div id="sameNameSection">
        <label for="sameName">Enter name once (max 12 characters, spaces included)</label>
        <input type="text" id="sameName" maxlength="12" />
        <div class="small-note">Maximum 12 characters total.</div>
      </div>

      <div id="differentNamesSection" class="hidden">
        <h3>Enter names for each tent</h3>
        <div id="dynamicNamesContainer"></div>
      </div>
    </div>

    <div class="section">
      <h2>Payment</h2>

      <div class="total-box">
        Amount Payable: $<span id="totalAmount">0.00</span>
      </div>

      <label for="paynowImage">Upload PayNow Screenshot</label>
      <input type="file" id="paynowImage" accept="image/*" />
      <div class="small-note">Image files only. Keep file size reasonably small.</div>
    </div>

    <button type="submit" id="submitBtn">Submit Order</button>
    <div class="message" id="formMessage"></div>
  </form>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAwcKlefRScKhhdM0x9iVfiQ-cvijdjOvCAvYwxz4IBKqjUONVOShklTWGoF0kQUlQ/exec";

    const form = document.getElementById("orderForm");
    const totalAmountEl = document.getElementById("totalAmount");
    const formMessage = document.getElementById("formMessage");
    const submitBtn = document.getElementById("submitBtn");
    const sameNameSection = document.getElementById("sameNameSection");
    const differentNamesSection = document.getElementById("differentNamesSection");
    const dynamicNamesContainer = document.getElementById("dynamicNamesContainer");

    function getQty(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function getSameNameMode() {
      return document.querySelector('input[name="sameNameMode"]:checked').value;
    }

    function calculateTotal() {
        const totalQty =
            getQty("design1Qty") +
            getQty("design2Qty") +
            getQty("design3Qty");

        const pairs = Math.floor(totalQty / 2);
        const remainder = totalQty % 2;

        const total = pairs * 7 + remainder * 4;

        totalAmountEl.textContent = total.toFixed(2);
        return total;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }

    function buildDynamicNameInputs() {
      dynamicNamesContainer.innerHTML = "";

      const designs = [
        { label: "Design 1", qty: getQty("design1Qty"), key: "design1" },
        { label: "Design 2", qty: getQty("design2Qty"), key: "design2" },
        { label: "Design 3", qty: getQty("design3Qty"), key: "design3" }
      ];

      designs.forEach(design => {
        if (design.qty > 0) {
          const wrapper = document.createElement("div");
          wrapper.className = "dynamic-name-group";

          let html = `<h3>${escapeHtml(design.label)}</h3>`;

          for (let i = 1; i <= design.qty; i++) {
            html += `
              <label for="${design.key}Name${i}">
                Name for name tent ${i}, ${escapeHtml(design.label)} (max 12 characters)
              </label>
              <input
                type="text"
                id="${design.key}Name${i}"
                data-design="${design.key}"
                data-index="${i}"
                class="dynamic-name-input"
                maxlength="12"
              />
            `;
          }

          wrapper.innerHTML = html;
          dynamicNamesContainer.appendChild(wrapper);
        }
      });
    }

    function updateNameModeUI() {
      const mode = getSameNameMode();

      if (mode === "yes") {
        sameNameSection.classList.remove("hidden");
        differentNamesSection.classList.add("hidden");
      } else {
        sameNameSection.classList.add("hidden");
        differentNamesSection.classList.remove("hidden");
        buildDynamicNameInputs();
      }
    }

    function collectDifferentNames() {
      const result = {
        design1: [],
        design2: [],
        design3: []
      };

      const inputs = document.querySelectorAll(".dynamic-name-input");

      inputs.forEach(input => {
        const design = input.dataset.design;
        const value = input.value.trim();
        if (value) {
          result[design].push(value);
        } else {
          result[design].push("");
        }
      });

      return result;
    }

    function validateForm() {
      const totalQty = getQty("design1Qty") + getQty("design2Qty") + getQty("design3Qty");
      if (totalQty === 0) {
        return "Please order at least one name tent.";
      }

      const mode = getSameNameMode();

      if (mode === "yes") {
        const sameName = document.getElementById("sameName").value.trim();
        if (!sameName) {
          return "Please enter the name to print.";
        }
        if (sameName.length > 12) {
          return "The name must be 12 characters or fewer.";
        }
      } else {
        const inputs = document.querySelectorAll(".dynamic-name-input");
        for (const input of inputs) {
          const value = input.value.trim();
          if (!value) {
            return "Please fill in all name fields.";
          }
          if (value.length > 12) {
            return "Each name must be 12 characters or fewer.";
          }
        }
      }

      const file = document.getElementById("paynowImage").files[0];
      if (!file) {
        return "Please upload your PayNow screenshot.";
      }

      if (!file.type.startsWith("image/")) {
        return "Please upload an image file only.";
      }

      return null;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(",")[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("design1Qty").addEventListener("input", () => {
      calculateTotal();
      if (getSameNameMode() === "no") buildDynamicNameInputs();
    });

    document.getElementById("design2Qty").addEventListener("input", () => {
      calculateTotal();
      if (getSameNameMode() === "no") buildDynamicNameInputs();
    });

    document.getElementById("design3Qty").addEventListener("input", () => {
      calculateTotal();
      if (getSameNameMode() === "no") buildDynamicNameInputs();
    });

    document.querySelectorAll('input[name="sameNameMode"]').forEach(radio => {
      radio.addEventListener("change", updateNameModeUI);
    });

    calculateTotal();
    updateNameModeUI();

    form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const error = validateForm();
  if (error) {
    formMessage.textContent = error;
    return;
  }

  submitBtn.disabled = true;
  formMessage.textContent = "Submitting...";

  try {
    const file = document.getElementById("paynowImage").files[0];
    const paynowImageBase64 = await fileToBase64(file);

    const sameNameMode = getSameNameMode();
    const total = calculateTotal();

    let designNames = {
      design1: [],
      design2: [],
      design3: []
    };

    let sameNameValue = "";

    if (sameNameMode === "yes") {
      sameNameValue = document.getElementById("sameName").value.trim();
    } else {
      designNames = collectDifferentNames();
    }

    const payload = {
      customerName: document.getElementById("customerName").value.trim(),
      contact: document.getElementById("contact").value.trim(),
      design1Qty: getQty("design1Qty"),
      design2Qty: getQty("design2Qty"),
      design3Qty: getQty("design3Qty"),
      sameNameForAll: sameNameMode === "yes",
      sameName: sameNameValue,
      design1Names: designNames.design1,
      design2Names: designNames.design2,
      design3Names: designNames.design3,
      amountPayable: total,
      paynowImage: {
        fileName: file.name,
        mimeType: file.type,
        base64Data: paynowImageBase64
      }
    };

    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload),
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      }
    });

    formMessage.textContent = "Order submitted successfully!";
    form.reset();
    document.getElementById("paynowImage").value = "";
    calculateTotal();
    updateNameModeUI();
    dynamicNamesContainer.innerHTML = "";

  } catch (err) {
    console.error(err);
    formMessage.textContent = "Error submitting form.";
  } finally {
    submitBtn.disabled = false;
  }
});
  </script>
</body>
</html>
