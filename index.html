<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Name Tent Preorder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.5;
      background: #fafafa;
    }

    h1, h2, h3, h4 {
      margin-bottom: 8px;
    }

    .section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .radio-group label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }

    .small-note {
      font-size: 0.9rem;
      color: #555;
    }

    .total-box {
      font-size: 1.2rem;
      font-weight: bold;
      padding: 14px;
      background: #f3f3f3;
      border-radius: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 12px;
      font-weight: bold;
    }

    .hidden {
      display: none !important;
    }

    .design-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      background: #fcfcfc;
    }

    .double-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .double-gallery-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      background: #fcfcfc;
    }

    .design-preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .design-preview-item {
      text-align: center;
    }

    .design-preview-item img {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f2f2f2;
      margin-bottom: 6px;
      display: block;
    }

    .design-preview-item span {
      font-size: 0.9rem;
      color: #555;
      font-weight: bold;
    }

    .dynamic-block {
      margin-top: 15px;
      padding: 14px;
      border: 1px dashed #bbb;
      border-radius: 10px;
      background: #fcfcfc;
    }

    .subtle-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: #f8f8f8;
      border: 1px solid #e5e5e5;
    }

    .note-box {
      margin-top: 12px;
      padding: 12px;
      background: #fff8e8;
      border: 1px solid #f0d58c;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .headerpng {
      width: 100%;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .comparison {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .price-tag {
      display: inline-block;
      background: #eef4ff;
      color: #234;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .image-box {
      margin: 18px 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      background: #fafafa;
    }

    .image-box img {
      width: 100%;
      display: block;
    }

    .side-demo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .side {
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      text-align: center;
    }

    .side-label {
      background: #f2f2f2;
      padding: 8px;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .side img {
      width: 100%;
      display: block;
    }

    .blank-side {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: #999;
      font-size: 1rem;
      font-weight: bold;
    }

    ul {
      padding-left: 18px;
      margin-bottom: 0;
      color: #444;
      line-height: 1.6;
    }

    .note {
      margin-top: 28px;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .side-demo {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <img src="sunshineform_head.png" class="headerpng" alt="Header">
    <div class="section">
      <h2>THE FORM IS NOW CLOSED. THANKYOU FOR SUPPORTING PROJECT SUNSHINE 16!</h2>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-AJ5DrpUSncJXCgWVnXJCqcu7oU52vZ4Q0qvo3BbMiBZELOAH59SzEg-3Q9qNWJwX/exec";

    const DESIGNS = [
      { value: "67_kid", label: "67 Kid", frontImage: "nametent_pics/67_front.png", backImage: "nametent_pics/67_back.png" },
      { value: "minecraft", label: "Minecraft", frontImage: "nametent_pics/minecraft_front.png", backImage: "nametent_pics/minecraft_back.png" },
      { value: "mcc_smiski", label: "Monchichi & Smiski", frontImage: "nametent_pics/mcc_smiski_front.png", backImage: "nametent_pics/mcc_smiski_back.png" },
      { value: "jellycat", label: "Jellycat", frontImage: "nametent_pics/jellycat_front.png", backImage: "nametent_pics/jellycat_back.png" },
      { value: "twinkle", label: "Twinkle Twinkle", frontImage: "nametent_pics/twinkle_front.png", backImage: "nametent_pics/twinkle_back.png" },
      { value: "pokemon", label: "Pokemon", frontImage: "nametent_pics/pokemon_front.png", backImage: "nametent_pics/pokemon_back.png" },
      { value: "linkedin", label: "LinkedIn", frontImage: "nametent_pics/linkedin_front.png", backImage: "nametent_pics/linkedin_back.png" },
      { value: "clash_royale", label: "Clash Royale", frontImage: "nametent_pics/clash_front.png", backImage: "nametent_pics/clash_back.png" },
      { value: "monkey", label: "Monkey Meme", frontImage: "nametent_pics/monkey_front.png", backImage: "nametent_pics/monkey_back.png" },
    ];

    const QUANTITY_SELECT_IDS = ["doubleTotalQty"];

    const form = document.getElementById("orderForm");
    const totalAmountEl = document.getElementById("totalAmount");
    const formMessage = document.getElementById("formMessage");
    const submitBtn = document.getElementById("submitBtn");

    const singleSidedSection = document.getElementById("singleSidedSection");
    const doubleSidedSection = document.getElementById("doubleSidedSection");
    const pricingNote = document.getElementById("pricingNote");

    const sameNameSection = document.getElementById("sameNameSection");
    const differentNamesSection = document.getElementById("differentNamesSection");
    const differentNamesContainer = document.getElementById("differentNamesContainer");
    const doubleTentSelectionContainer = document.getElementById("doubleTentSelectionContainer");

    const singleDesignCards = document.getElementById("singleDesignCards");
    const doubleGalleryGrid = document.getElementById("doubleGalleryGrid");

    function createQuantityOptions(max = 10) {
      let html = "";
      for (let i = 0; i <= max; i++) {
        html += `<option value="${i}">${i}</option>`;
      }
      return html;
    }

    function renderSingleDesignCards() {
      singleDesignCards.innerHTML = DESIGNS.map(design => `
        <div class="design-card">
          <div class="design-preview-grid">
            <div class="design-preview-item">
              <img src="${design.frontImage}" alt="${design.label} Front" />
              <span>Front</span>
            </div>
            <div class="design-preview-item">
              <img src="${design.backImage}" alt="${design.label} Back" />
              <span>Back</span>
            </div>
          </div>

          <h3>${design.label}</h3>
          <label for="qty_${design.value}">Quantity</label>
          <select id="qty_${design.value}" class="single-qty-select">
            ${createQuantityOptions(10)}
          </select>
        </div>
      `).join("");
    }

    function renderDoubleGallery() {
      doubleGalleryGrid.innerHTML = DESIGNS.map(design => `
        <div class="double-gallery-card">
          <div class="design-preview-grid">
            <div class="design-preview-item">
              <img src="${design.frontImage}" alt="${design.label} Front" />
              <span>Front</span>
            </div>
            <div class="design-preview-item">
              <img src="${design.backImage}" alt="${design.label} Back" />
              <span>Back</span>
            </div>
          </div>

          <strong>${design.label}</strong>
        </div>
      `).join("");
    }

    function populateStaticDropdowns() {
      QUANTITY_SELECT_IDS.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = createQuantityOptions(10);
        select.value = "0";
      });
    }

    function getTentType() {
      return document.querySelector('input[name="tentType"]:checked').value;
    }

    function getSameNameMode() {
      return document.querySelector('input[name="sameNameMode"]:checked').value;
    }

    function getNumberValue(id) {
      return Number(document.getElementById(id).value) || 0;
    }

    function getSingleDesignQty(designValue) {
      const el = document.getElementById(`qty_${designValue}`);
      return el ? Number(el.value) || 0 : 0;
    }

    function calculateBundlePrice(totalQty, onePrice, pairPrice) {
      const pairs = Math.floor(totalQty / 2);
      const remainder = totalQty % 2;
      return (pairs * pairPrice) + (remainder * onePrice);
    }

    function getSingleSidedTotalQty() {
      return DESIGNS.reduce((sum, design) => sum + getSingleDesignQty(design.value), 0);
    }

    function getDoubleSidedTotalQty() {
      return getNumberValue("doubleTotalQty");
    }

    function getTotalQty() {
      return getTentType() === "single" ? getSingleSidedTotalQty() : getDoubleSidedTotalQty();
    }

    function calculateTotal() {
      const tentType = getTentType();
      const totalQty = getTotalQty();

      let total = 0;
      if (tentType === "single") {
        total = calculateBundlePrice(totalQty, 4, 7);
      } else {
        total = calculateBundlePrice(totalQty, 5, 8);
      }

      totalAmountEl.textContent = total.toFixed(2);
      return total;
    }

    function updateTentTypeUI() {
      const tentType = getTentType();

      if (tentType === "single") {
        singleSidedSection.classList.remove("hidden");
        doubleSidedSection.classList.add("hidden");
        pricingNote.textContent = "Single-sided pricing: 1 for $4, 2 for $7";

        // clear double-sided selections when switching to single
        document.getElementById("doubleTotalQty").value = "0";
        doubleTentSelectionContainer.innerHTML = "";
      } else {
        singleSidedSection.classList.add("hidden");
        doubleSidedSection.classList.remove("hidden");
        pricingNote.textContent = "Double-sided pricing: 1 for $5, 2 for $8";

        // clear single-sided quantities when switching to double
        DESIGNS.forEach(design => {
          const qtyEl = document.getElementById(`qty_${design.value}`);
          if (qtyEl) qtyEl.value = "0";
        });
      }

      buildDynamicSections();
      calculateTotal();
    }

    function createDesignOptionsHtml() {
      return DESIGNS.map(design => {
        return `<option value="${design.value}">${design.label}</option>`;
      }).join("");
    }

    function buildDoubleTentSelectors() {
      doubleTentSelectionContainer.innerHTML = "";

      const qty = getDoubleSidedTotalQty();
      if (qty <= 0) return;

      let html = "";
      for (let i = 1; i <= qty; i++) {
        html += `
          <div class="dynamic-block">
            <h3>Name Tent ${i}</h3>

            <label for="doubleTent${i}Side1">Side 1 Design</label>
            <select id="doubleTent${i}Side1" class="double-side-select">
              <option value="">Select a design</option>
              ${createDesignOptionsHtml()}
            </select>

            <label for="doubleTent${i}Side2">Side 2 Design</label>
            <select id="doubleTent${i}Side2" class="double-side-select">
              <option value="">Select a design</option>
              ${createDesignOptionsHtml()}
            </select>
          </div>
        `;
      }

      doubleTentSelectionContainer.innerHTML = html;
    }

    function buildSingleDifferentNameInputs() {
      let html = "";

      DESIGNS.forEach(design => {
        const qty = getSingleDesignQty(design.value);
        if (qty > 0) {
          html += `<div class="dynamic-block"><h4>${design.label}</h4>`;
          for (let i = 1; i <= qty; i++) {
            html += `
              <label for="${design.value}Name${i}">
                Name for ${design.label} - Tent ${i} (max 12 characters)
              </label>
              <input
                type="text"
                id="${design.value}Name${i}"
                maxlength="12"
                class="single-different-name-input"
                data-design="${design.value}"
              />
            `;
          }
          html += `</div>`;
        }
      });

      differentNamesContainer.innerHTML = html;
    }

    function buildDoubleDifferentNameInputs() {
      let html = "";
      const qty = getDoubleSidedTotalQty();

      for (let i = 1; i <= qty; i++) {
        html += `
          <div class="dynamic-block">
            <label for="doubleTentName${i}">
              Name for Name Tent ${i} (max 12 characters)
            </label>
            <input
              type="text"
              id="doubleTentName${i}"
              maxlength="12"
              class="double-different-name-input"
            />
          </div>
        `;
      }

      differentNamesContainer.innerHTML = html;
    }

    function buildDynamicSections() {
      const tentType = getTentType();
      const sameNameMode = getSameNameMode();

      if (tentType === "double") {
        buildDoubleTentSelectors();
      } else {
        doubleTentSelectionContainer.innerHTML = "";
      }

      if (sameNameMode === "yes") {
        sameNameSection.classList.remove("hidden");
        differentNamesSection.classList.add("hidden");
        differentNamesContainer.innerHTML = "";
      } else {
        sameNameSection.classList.add("hidden");
        differentNamesSection.classList.remove("hidden");

        if (tentType === "single") {
          buildSingleDifferentNameInputs();
        } else {
          buildDoubleDifferentNameInputs();
        }
      }
    }

    function collectSingleSidedNames() {
      const result = {};
      DESIGNS.forEach(design => {
        result[design.value] = [];
      });

      const inputs = document.querySelectorAll(".single-different-name-input");
      inputs.forEach(input => {
        const design = input.dataset.design;
        result[design].push(input.value.trim());
      });

      return result;
    }

    function collectSingleSidedDesignQtys() {
      const result = {};
      DESIGNS.forEach(design => {
        result[design.value] = getSingleDesignQty(design.value);
      });
      return result;
    }

    function collectDoubleSidedInfo() {
      const qty = getDoubleSidedTotalQty();
      const sameNameMode = getSameNameMode();
      const result = [];

      for (let i = 1; i <= qty; i++) {
        const side1 = document.getElementById(`doubleTent${i}Side1`).value;
        const side2 = document.getElementById(`doubleTent${i}Side2`).value;

        const tentObj = {};
        tentObj[`nametent${i}`] = [side1, side2];

        if (sameNameMode === "no") {
          tentObj.name = document.getElementById(`doubleTentName${i}`).value.trim();
        }

        result.push(tentObj);
      }

      return result;
    }

    function validateForm() {
      const tentType = getTentType();
      const sameNameMode = getSameNameMode();
      const totalQty = getTotalQty();

      if (totalQty === 0) {
        return "Please order at least one name tent.";
      }

      if (sameNameMode === "yes") {
        const sameName = document.getElementById("sameName").value.trim();
        if (!sameName) return "Please enter the name to print.";
        if (sameName.length > 12) return "The name must be 12 characters or fewer.";
      } else {
        if (tentType === "single") {
          const inputs = document.querySelectorAll(".single-different-name-input");
          for (const input of inputs) {
            const value = input.value.trim();
            if (!value) return "Please fill in all name fields.";
            if (value.length > 12) return "Each name must be 12 characters or fewer.";
          }
        } else {
          const nameInputs = document.querySelectorAll(".double-different-name-input");
          for (const input of nameInputs) {
            const value = input.value.trim();
            if (!value) return "Please fill in all name fields.";
            if (value.length > 12) return "Each name must be 12 characters or fewer.";
          }
        }
      }

      if (tentType === "double") {
        const qty = getDoubleSidedTotalQty();
        for (let i = 1; i <= qty; i++) {
          const side1 = document.getElementById(`doubleTent${i}Side1`).value;
          const side2 = document.getElementById(`doubleTent${i}Side2`).value;
          if (!side1 || !side2) return `Please select both sides for Name Tent ${i}.`;
        }
      }

      const file = document.getElementById("paynowImage").files[0];
      if (!file) return "Please upload your PayNow screenshot.";
      if (!file.type.startsWith("image/")) return "Please upload an image file only.";

      return null;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64 = result.split(",")[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function buildPayload(paynowImageBase64, file) {
      const tentType = getTentType();
      const sameNameMode = getSameNameMode();
      const total = calculateTotal();

      let sameNameValue = "";
      if (sameNameMode === "yes") {
        sameNameValue = document.getElementById("sameName").value.trim();
      }

      if (tentType === "single") {
      const singleSidedDesigns = collectSingleSidedDesignQtys();
      const singleSidedInfo = buildSingleSidedInfo();

      return {
        customerName: document.getElementById("customerName").value.trim(),
        contact: document.getElementById("contact").value.trim(),
        tentType: "single",
        sameNameForAll: sameNameMode === "yes",
        sameName: sameNameValue,

        // NEW
        singleSidedQty: getSingleSidedTotalQty(),

        // keep both (optional but useful)
        singleSidedDesigns: singleSidedDesigns,
        singleSidedInfo: singleSidedInfo,

        // discard double
        doubleSidedQty: 0,
        doubleSidedInfo: [],

        amountPayable: total,
        paynowImage: {
          fileName: file.name,
          mimeType: file.type,
          base64Data: paynowImageBase64
        }
      };
    }

      if (tentType === "double") {
        const doubleSidedInfo = collectDoubleSidedInfo();

        return {
          customerName: document.getElementById("customerName").value.trim(),
          contact: document.getElementById("contact").value.trim(),
          tentType: "double",
          sameNameForAll: sameNameMode === "yes",
          sameName: sameNameValue,

          // discard all single-sided data
          singleSidedDesigns: {},
          singleSidedNames: {},

          // keep only double-sided data
          doubleSidedQty: getDoubleSidedTotalQty(),
          doubleSidedInfo: doubleSidedInfo,

          amountPayable: total,
          paynowImage: {
            fileName: file.name,
            mimeType: file.type,
            base64Data: paynowImageBase64
          }
        };
      }
    }
    function buildSingleSidedInfo() {
  const sameNameMode = getSameNameMode();
  const result = {};

  DESIGNS.forEach(design => {
    const qty = getSingleDesignQty(design.value);
    if (qty <= 0) return;

    let names = [];

    if (sameNameMode === "yes") {
      const sameName = document.getElementById("sameName").value.trim();
      names = Array(qty).fill(sameName);
    } else {
      for (let i = 1; i <= qty; i++) {
        const input = document.getElementById(`${design.value}Name${i}`);
        names.push(input ? input.value.trim() : "");
      }
    }

    result[design.value] = {
      qty: qty,
      names: names
    };
  });

  return result;
}

    document.querySelectorAll('input[name="tentType"]').forEach(radio => {
      radio.addEventListener("change", updateTentTypeUI);
    });

    document.querySelectorAll('input[name="sameNameMode"]').forEach(radio => {
      radio.addEventListener("change", buildDynamicSections);
    });

    document.addEventListener("change", (e) => {
      if (e.target.matches(".single-qty-select") || e.target.id === "doubleTotalQty") {
        calculateTotal();
        buildDynamicSections();
      }
    });

    renderSingleDesignCards();
    renderDoubleGallery();
    populateStaticDropdowns();
    calculateTotal();
    updateTentTypeUI();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const error = validateForm();
      if (error) {
        alert(error);
        return;
      }

      submitBtn.disabled = true;
      formMessage.textContent = "Submitting...";

      try {
        const file = document.getElementById("paynowImage").files[0];
        const paynowImageBase64 = await fileToBase64(file);
        const payload = buildPayload(paynowImageBase64, file);

        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        window.location.href = "success.html";
      } catch (err) {
        console.error(err);
        alert("Form submission failed.");
        formMessage.textContent = "Form submission failed.";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
