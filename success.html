<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Submitted</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 40px 20px;
    }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      color: #555;
      font-size: 1rem;
      line-height: 1.6;
    }

    a.button {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: black;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Order submitted successfully 🎉</h1>
    <p>Thank you for your order. We’ve received your submission and payment screenshot.</p>
    <p>We’ll review it and contact you via your Telegram handle if needed.</p>
    <a class="button" href="index.html">Submit another order</a>
  </div>
</body>
</html>
